<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="텔레그램 설정 체크리스트">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12283d; }
      .step { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #1f3e5f; }
      .text { font: 500 19px 'Segoe UI', Arial, sans-serif; fill: #294d6b; }
      .mono { font: 600 18px 'Consolas', 'Courier New', monospace; fill: #103a56; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#f6fbff" rx="20"/>
  <text x="60" y="78" class="title">Telegram 봇 / chat_id 설정</text>

  <rect x="60" y="120" width="1160" height="145" rx="16" fill="#ffffff" stroke="#c7dff0"/>
  <text x="90" y="168" class="step">1단계. @BotFather에서 봇 생성</text>
  <text x="90" y="206" class="text">- BotFather에서 /newbot 실행 후 Bot Token 저장</text>
  <text x="90" y="240" class="text">- 생성한 봇(또는 그룹)에 메시지 1개 전송</text>

  <rect x="60" y="290" width="1160" height="175" rx="16" fill="#ffffff" stroke="#c7dff0"/>
  <text x="90" y="338" class="step">2단계. getUpdates로 chat_id 조회</text>
  <text x="90" y="378" class="mono">TOKEN='&lt;YOUR_TELEGRAM_BOT_TOKEN&gt;'</text>
  <text x="90" y="410" class="mono">curl -s "https://api.telegram.org/bot${TOKEN}/getUpdates" | jq</text>
  <text x="90" y="444" class="text">result[-1].message.chat.id 확인 (개인: 양수, 그룹: 보통 -100...)</text>

  <rect x="60" y="490" width="1160" height="200" rx="16" fill="#ffffff" stroke="#c7dff0"/>
  <text x="90" y="538" class="step">3단계. 값이 비어 있을 때</text>
  <text x="90" y="576" class="mono">curl -s "https://api.telegram.org/bot${TOKEN}/deleteWebhook" | jq</text>
  <text x="90" y="610" class="text">봇에 메시지를 다시 보내고 getUpdates 재실행</text>
  <text x="90" y="646" class="text">확인한 값을 TELEGRAM_CHAT_ID secret에 등록</text>
</svg>
