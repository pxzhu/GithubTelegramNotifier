<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-label="GitHub to Telegram architecture overview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#ecfff7"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f2740; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #38536b; }
      .boxTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f2740; }
      .text { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #29465f; }
      .chip { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #0f2740; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="560" fill="url(#bg)" rx="24" />

  <text x="60" y="72" class="title">GitHub Events -> Cloudflare Worker -> Telegram</text>
  <text x="60" y="108" class="subtitle">Single webhook endpoint for all repositories (Issues / PR / Push)</text>

  <rect x="70" y="170" width="320" height="280" rx="20" fill="#ffffff" stroke="#c9d8ef" stroke-width="2"/>
  <text x="100" y="220" class="boxTitle">1) GitHub App</text>
  <text x="100" y="258" class="text">Installed on All repositories</text>
  <text x="100" y="292" class="text">Sends webhook payloads</text>
  <text x="100" y="326" class="text">Events: issues, pull_request, push</text>

  <rect x="480" y="170" width="320" height="280" rx="20" fill="#ffffff" stroke="#b9e4d2" stroke-width="2"/>
  <text x="510" y="220" class="boxTitle">2) Cloudflare Worker</text>
  <text x="510" y="258" class="text">Verifies X-Hub-Signature-256</text>
  <text x="510" y="292" class="text">Builds readable message</text>
  <text x="510" y="326" class="text">Uses Telegram bot + chat secrets</text>

  <rect x="890" y="170" width="320" height="280" rx="20" fill="#ffffff" stroke="#cfd7f7" stroke-width="2"/>
  <text x="920" y="220" class="boxTitle">3) Telegram</text>
  <text x="920" y="258" class="text">sendMessage API</text>
  <text x="920" y="292" class="text">Receives issue / PR / push alerts</text>
  <text x="920" y="326" class="text">Personal chat or group chat</text>

  <line x1="390" y1="310" x2="480" y2="310" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="310" x2="890" y2="310" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="462" width="230" height="38" rx="19" fill="#e8f0ff"/>
  <text x="111" y="487" class="chip">Webhook URL: workers.dev</text>

  <rect x="475" y="462" width="350" height="38" rx="19" fill="#e4fff1"/>
  <text x="496" y="487" class="chip">Secrets: BOT_TOKEN / CHAT_ID / WEBHOOK_SECRET</text>

  <rect x="914" y="462" width="212" height="38" rx="19" fill="#eee9ff"/>
  <text x="946" y="487" class="chip">Delivery check: 200 OK</text>
</svg>
